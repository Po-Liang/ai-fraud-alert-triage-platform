AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AI-powered fraud alert triage platform infrastructure for Phase 5.

Parameters:
  OpenAISecretName:
    Type: String
    Default: ai-fraud-triage/openai-api-key
    Description: Secrets Manager secret name that stores the OpenAI API key.
  OpenAIModel:
    Type: String
    Default: gpt-4o-mini
    Description: OpenAI model name used by the async analysis worker.

Globals:
  Function:
    Runtime: python3.12
    CodeUri: .
    Timeout: 10
    MemorySize: 128

Resources:
  FraudTriageApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: FraudTriageApi
      StageName: Prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,OPTIONS'"
      MergeDefinitions: true
      DefinitionBody:
        swagger: "2.0"
        info:
          title: FraudTriageApi
          version: "1.0"
        paths:
          /alerts:
            options: &CorsPreflightOptions
              summary: CORS preflight support
              responses:
                "200":
                  description: CORS preflight response
                  headers:
                    Access-Control-Allow-Headers:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Origin:
                      type: string
              x-amazon-apigateway-integration:
                type: mock
                requestTemplates:
                  application/json: '{"statusCode": 200}'
                responses:
                  default:
                    statusCode: "200"
                    responseParameters:
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
                      method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
                      method.response.header.Access-Control-Allow-Origin: "'*'"
                passthroughBehavior: when_no_match
          /alerts/{alertId}:
            options: *CorsPreflightOptions
          /alerts/{alertId}/analyze:
            options: *CorsPreflightOptions
          /alerts/{alertId}/review:
            options: *CorsPreflightOptions
          /claims/analyze:
            options: *CorsPreflightOptions
          /rag/query:
            options: *CorsPreflightOptions

  FraudAlertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: FraudAlertsTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  FraudAnalysisDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: FraudAnalysisDeadLetterQueue

  FraudAnalysisQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: FraudAnalysisQueue
      VisibilityTimeout: 180
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FraudAnalysisDeadLetterQueue.Arn
        maxReceiveCount: 3

  CreateAlertFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: src.handlers.create_alert.lambda_handler
      Environment:
        Variables:
          ALERTS_TABLE_NAME: !Ref FraudAlertsTable
          ANALYSIS_QUEUE_URL: !Ref FraudAnalysisQueue
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt FraudAlertsTable.Arn
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt FraudAnalysisQueue.Arn
      Events:
        CreateAlertApi:
          Type: Api
          Properties:
            RestApiId: !Ref FraudTriageApi
            Path: /alerts
            Method: post

  ListAlertsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: src.handlers.list_alerts.lambda_handler
      Environment:
        Variables:
          ALERTS_TABLE_NAME: !Ref FraudAlertsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: !GetAtt FraudAlertsTable.Arn
      Events:
        ListAlertsApi:
          Type: Api
          Properties:
            RestApiId: !Ref FraudTriageApi
            Path: /alerts
            Method: get

  GetAlertFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: src.handlers.get_alert.lambda_handler
      Environment:
        Variables:
          ALERTS_TABLE_NAME: !Ref FraudAlertsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt FraudAlertsTable.Arn
      Events:
        GetAlertApi:
          Type: Api
          Properties:
            RestApiId: !Ref FraudTriageApi
            Path: /alerts/{alertId}
            Method: get

  AnalyzeAlertFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: src.handlers.analyze_alert.lambda_handler
      Environment:
        Variables:
          ALERTS_TABLE_NAME: !Ref FraudAlertsTable
          ANALYSIS_QUEUE_URL: !Ref FraudAnalysisQueue
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt FraudAlertsTable.Arn
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt FraudAnalysisQueue.Arn
      Events:
        AnalyzeAlertApi:
          Type: Api
          Properties:
            RestApiId: !Ref FraudTriageApi
            Path: /alerts/{alertId}/analyze
            Method: post

  AnalysisWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: src.handlers.analysis_worker.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          ALERTS_TABLE_NAME: !Ref FraudAlertsTable
          OPENAI_SECRET_NAME: !Ref OpenAISecretName
          OPENAI_MODEL: !Ref OpenAIModel
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt FraudAlertsTable.Arn
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${OpenAISecretName}*"
      Events:
        AnalysisQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt FraudAnalysisQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

  ReviewAlertFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: src.handlers.review_alert.lambda_handler
      Environment:
        Variables:
          ALERTS_TABLE_NAME: !Ref FraudAlertsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt FraudAlertsTable.Arn
      Events:
        ReviewAlertApi:
          Type: Api
          Properties:
            RestApiId: !Ref FraudTriageApi
            Path: /alerts/{alertId}/review
            Method: post

  RagQueryFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: src.handlers.rag_query.lambda_handler
      Timeout: 15
      Environment:
        Variables:
          OPENAI_SECRET_NAME: !Ref OpenAISecretName
          OPENAI_MODEL: !Ref OpenAIModel
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${OpenAISecretName}*"
      Events:
        RagQueryApi:
          Type: Api
          Properties:
            RestApiId: !Ref FraudTriageApi
            Path: /rag/query
            Method: post

  AnalyzeClaimFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: src.handlers.analyze_claim.lambda_handler
      Events:
        AnalyzeClaimApi:
          Type: Api
          Properties:
            RestApiId: !Ref FraudTriageApi
            Path: /claims/analyze
            Method: post

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for the Fraud Triage API.
    Value: !Sub "https://${FraudTriageApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"

  FraudAlertsTableName:
    Description: Name of the fraud alerts DynamoDB table.
    Value: !Ref FraudAlertsTable

  FraudAnalysisQueueUrl:
    Description: URL of the fraud analysis SQS queue.
    Value: !Ref FraudAnalysisQueue
