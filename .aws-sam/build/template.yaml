AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI-powered fraud alert triage platform infrastructure for Phase 5.
Parameters:
  OpenAISecretName:
    Type: String
    Default: ai-fraud-triage/openai-api-key
    Description: Secrets Manager secret name that stores the OpenAI API key.
  OpenAIModel:
    Type: String
    Default: gpt-4o-mini
    Description: OpenAI model name used by the async analysis worker.
Globals:
  Function:
    Runtime: python3.12
    CodeUri: .
    Timeout: 10
    MemorySize: 128
Resources:
  FraudTriageApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: FraudTriageApi
      StageName: Prod
  FraudAlertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: FraudAlertsTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
  FraudAnalysisDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: FraudAnalysisDeadLetterQueue
  FraudAnalysisQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: FraudAnalysisQueue
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
          - FraudAnalysisDeadLetterQueue
          - Arn
        maxReceiveCount: 3
  CreateAlertFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      SamResourceId: CreateAlertFunction
    Properties:
      Handler: src.handlers.create_alert.lambda_handler
      Environment:
        Variables:
          ALERTS_TABLE_NAME:
            Ref: FraudAlertsTable
          ANALYSIS_QUEUE_URL:
            Ref: FraudAnalysisQueue
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:PutItem
          Resource:
            Fn::GetAtt:
            - FraudAlertsTable
            - Arn
        - Effect: Allow
          Action:
          - sqs:SendMessage
          Resource:
            Fn::GetAtt:
            - FraudAnalysisQueue
            - Arn
      Events:
        CreateAlertApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: FraudTriageApi
            Path: /alerts
            Method: post
      CodeUri: CreateAlertFunction
  ListAlertsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      SamResourceId: ListAlertsFunction
    Properties:
      Handler: src.handlers.list_alerts.lambda_handler
      Environment:
        Variables:
          ALERTS_TABLE_NAME:
            Ref: FraudAlertsTable
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:Scan
          Resource:
            Fn::GetAtt:
            - FraudAlertsTable
            - Arn
      Events:
        ListAlertsApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: FraudTriageApi
            Path: /alerts
            Method: get
      CodeUri: ListAlertsFunction
  GetAlertFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      SamResourceId: GetAlertFunction
    Properties:
      Handler: src.handlers.get_alert.lambda_handler
      Environment:
        Variables:
          ALERTS_TABLE_NAME:
            Ref: FraudAlertsTable
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:GetItem
          Resource:
            Fn::GetAtt:
            - FraudAlertsTable
            - Arn
      Events:
        GetAlertApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: FraudTriageApi
            Path: /alerts/{alertId}
            Method: get
      CodeUri: GetAlertFunction
  AnalyzeAlertFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      SamResourceId: AnalyzeAlertFunction
    Properties:
      Handler: src.handlers.analyze_alert.lambda_handler
      Environment:
        Variables:
          ALERTS_TABLE_NAME:
            Ref: FraudAlertsTable
          ANALYSIS_QUEUE_URL:
            Ref: FraudAnalysisQueue
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
          Resource:
            Fn::GetAtt:
            - FraudAlertsTable
            - Arn
        - Effect: Allow
          Action:
          - sqs:SendMessage
          Resource:
            Fn::GetAtt:
            - FraudAnalysisQueue
            - Arn
      Events:
        AnalyzeAlertApi:
          Type: Api
          Properties:
            RestApiId:
              Ref: FraudTriageApi
            Path: /alerts/{alertId}/analyze
            Method: post
      CodeUri: AnalyzeAlertFunction
  AnalysisWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
      SamResourceId: AnalysisWorkerFunction
    Properties:
      Handler: src.handlers.analysis_worker.lambda_handler
      Environment:
        Variables:
          ALERTS_TABLE_NAME:
            Ref: FraudAlertsTable
          OPENAI_SECRET_NAME:
            Ref: OpenAISecretName
          OPENAI_MODEL:
            Ref: OpenAIModel
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
          Resource:
            Fn::GetAtt:
            - FraudAlertsTable
            - Arn
        - Effect: Allow
          Action:
          - secretsmanager:GetSecretValue
          Resource:
            Fn::Sub: arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${OpenAISecretName}*
      Events:
        AnalysisQueueEvent:
          Type: SQS
          Properties:
            Queue:
              Fn::GetAtt:
              - FraudAnalysisQueue
              - Arn
            BatchSize: 10
            FunctionResponseTypes:
            - ReportBatchItemFailures
      CodeUri: AnalysisWorkerFunction
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for the Fraud Triage API.
    Value:
      Fn::Sub: https://${FraudTriageApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  FraudAlertsTableName:
    Description: Name of the fraud alerts DynamoDB table.
    Value:
      Ref: FraudAlertsTable
  FraudAnalysisQueueUrl:
    Description: URL of the fraud analysis SQS queue.
    Value:
      Ref: FraudAnalysisQueue
